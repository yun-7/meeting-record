substitutions:
  _SERVICE_NAME: meeting-web
  _REGION: asia-east1
  _IMAGE: gcr.io/julia-500214/meeting-web

options:
  logging: CLOUD_LOGGING_ONLY
  # Higher-CPU machine speeds up the Whisper model download on cold cache misses
  machineType: 'E2_HIGHCPU_8'

steps:
  # Step 1: Pull previous image for layer caching (failure is OK on first run)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-pull-cache'
    entrypoint: bash
    args: ['-c', 'docker pull $_IMAGE:latest || true']

  # Step 2: Build full image with cache-from to reuse unchanged layers
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    dir: 'web'
    args:
      - 'build'
      - '--cache-from=$_IMAGE:latest'
      - '--tag=$_IMAGE:$SHORT_SHA'
      - '--tag=$_IMAGE:latest'
      - '.'

  # Step 3: Push commit-SHA tag (immutable, used for deployment)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-sha'
    args: ['push', '$_IMAGE:$SHORT_SHA']

  # Step 4: Push latest tag (used as cache source for next build)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-latest'
    args: ['push', '$_IMAGE:latest']

  # Step 5: Deploy to Cloud Run using the immutable SHA tag
  # Secrets are injected from Secret Manager at runtime — never stored in source
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--remove-env-vars=SITE_PASSWORD,GCS_BUCKET'
      - '--update-secrets=SITE_PASSWORD=meeting-web-site-password:latest,GCS_BUCKET=meeting-web-gcs-bucket:latest'
      # Whisper medium model needs ~1.5 GB; add headroom for video buffers and Gemini response
      - '--memory=4Gi'
      - '--cpu=2'
      # Background transcription threads must keep running after the HTTP response returns.
      # Without this flag Cloud Run throttles the CPU to ~0 the moment /api/process responds,
      # freezing the thread before it can transcribe anything.
      - '--no-cpu-throttling'
      # Keep at least one warm instance so an in-progress job isn't killed by scale-to-zero
      - '--min-instances=1'
      # Cap at one instance: jobs are stored in-memory, routing to a second instance
      # would cause 404 on status checks
      - '--max-instances=1'
      # Route same client to same instance as an extra safety net
      - '--session-affinity'
      # gen2 gives 32 GB NVMe /tmp (gen1 default is only 512 MB — too small for large video files)
      - '--execution-environment=gen2'

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'
